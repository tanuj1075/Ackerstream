<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Sum Calculator</title>
</head>
<body>
    <h2>Sum Calculator Servlet</h2>
    <form action="sum" method="POST">

        <label for="num2">Number 2:</label>

    </form>
</body>
</html>
